name: Deploy Supabase

# Auto-deploys Supabase artefacts (migrations + edge functions) whenever the
# relevant paths change on `main`, plus manual dispatch from the Actions UI.
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   SUPABASE_ACCESS_TOKEN  — https://supabase.com/dashboard/account/tokens
#   SUPABASE_DB_PASSWORD   — project database password
#   SUPABASE_PROJECT_REF   — project ref (e.g. dmprkdvkzzjtixlatnlx)
#
# Concurrency: serialized per branch; a fresh push waits instead of racing.

on:
  push:
    branches: [main]
    paths:
      - 'supabase/migrations/**'
      - 'supabase/functions/**'
  workflow_dispatch:
    inputs:
      only_functions:
        description: 'Comma-separated list of functions to deploy (empty = all changed under supabase/functions/ on this commit)'
        required: false
        default: ''
      skip_migrations:
        description: 'Skip db push (deploy functions only)'
        type: boolean
        required: false
        default: false

permissions:
  contents: read

concurrency:
  group: deploy-supabase-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2  # enough to diff this push vs parent

      - name: Validate required secrets
        run: |
          missing=()
          [ -n "$SUPABASE_ACCESS_TOKEN" ] || missing+=(SUPABASE_ACCESS_TOKEN)
          [ -n "$SUPABASE_DB_PASSWORD" ]  || missing+=(SUPABASE_DB_PASSWORD)
          [ -n "$SUPABASE_PROJECT_REF" ]  || missing+=(SUPABASE_PROJECT_REF)
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Missing required secrets: ${missing[*]}"
            exit 1
          fi

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link project
        run: supabase link --project-ref "$SUPABASE_PROJECT_REF" --password "$SUPABASE_DB_PASSWORD"

      - name: Apply migrations
        if: ${{ github.event.inputs.skip_migrations != 'true' }}
        run: |
          echo "::group::supabase db push"
          # Non-interactive: pipe y to cover any confirmation prompt; password
          # avoids credential prompt. `db push` is idempotent — already-applied
          # migrations are skipped, so re-runs are safe.
          yes | supabase db push --password "$SUPABASE_DB_PASSWORD"
          echo "::endgroup::"

      - name: Determine functions to deploy
        id: fns
        run: |
          if [ -n "${{ github.event.inputs.only_functions }}" ]; then
            echo "list=${{ github.event.inputs.only_functions }}" >> "$GITHUB_OUTPUT"
            echo "Manual dispatch — deploying: ${{ github.event.inputs.only_functions }}"
          else
            # Detect function directories touched by this commit range
            BASE="${{ github.event.before }}"
            HEAD="${{ github.sha }}"
            if [ -z "$BASE" ] || [ "$BASE" = "0000000000000000000000000000000000000000" ]; then
              BASE="${HEAD}^"
            fi
            CHANGED=$(git diff --name-only "$BASE" "$HEAD" | \
              awk -F/ '$1=="supabase" && $2=="functions" && $3!="" && $3!="_shared" {print $3}' | \
              sort -u | paste -sd,)
            echo "list=${CHANGED:-}" >> "$GITHUB_OUTPUT"
            echo "Auto-detected changed functions: ${CHANGED:-<none>}"
          fi

      - name: Deploy functions
        if: steps.fns.outputs.list != ''
        run: |
          IFS=',' read -ra FNS <<< "${{ steps.fns.outputs.list }}"
          for fn in "${FNS[@]}"; do
            fn="$(echo "$fn" | xargs)"  # trim
            [ -z "$fn" ] && continue
            echo "::group::deploy $fn"
            supabase functions deploy "$fn" --project-ref "$SUPABASE_PROJECT_REF"
            echo "::endgroup::"
          done

      - name: Summary
        if: always()
        run: |
          {
            echo "## Supabase deploy"
            echo ""
            echo "- Project: \`$SUPABASE_PROJECT_REF\`"
            echo "- Migrations: ${{ github.event.inputs.skip_migrations == 'true' && 'skipped' || 'applied' }}"
            echo "- Functions: \`${{ steps.fns.outputs.list || '(none)' }}\`"
            echo "- Commit: ${{ github.sha }}"
          } >> "$GITHUB_STEP_SUMMARY"
