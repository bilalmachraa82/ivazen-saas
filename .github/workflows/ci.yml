name: CI

on:
  push:
    branches: [main, 'release/**']
  pull_request:
    branches: [main, 'release/**']

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    name: Lint, Test & Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Run unit tests
        run: npm test

      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: https://placeholder.supabase.co
          VITE_SUPABASE_PUBLISHABLE_KEY: placeholder-anon-key

      - name: Upload build artifact
        if: success() && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ github.sha }}
          path: dist/
          retention-days: 7

      # Authenticated smoke E2E. The wrapper (scripts/e2e-smoke-gate.mjs) exits
      # cleanly with a warning when DEMO_EMAIL/DEMO_PASSWORD are absent, so the
      # job is non-blocking until the secrets are wired. Once set, every push to
      # main runs the smoke journey against the configured base URL.
      - name: Install Playwright browsers
        if: success() && github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: npx playwright install --with-deps chromium

      - name: Run smoke E2E (release gate)
        if: success() && github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: npm run e2e:smoke
        env:
          DEMO_EMAIL: ${{ secrets.DEMO_EMAIL }}
          DEMO_PASSWORD: ${{ secrets.DEMO_PASSWORD }}
          VITE_SUPABASE_URL: ${{ secrets.SMOKE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SMOKE_SUPABASE_ANON_KEY }}
          E2E_BASE_URL: ${{ secrets.E2E_BASE_URL }}
